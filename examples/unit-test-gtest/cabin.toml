[package]
name = "unit-test-gtest"
version = "0.1.0"
cxx-standard = "c++17"

# Test-only: `cabin test` activates dev dependencies for the
# selected packages, so the `test` target can link the port while
# `cabin build` ignores it entirely.
[dev-dependencies]
googletest = { port = true, version = "^1.17" }

[target.stats]
type = "library"
sources = ["src/stats.cc"]
include-dirs = ["include"]

[target.stats_gtest]
type = "test"
sources = ["tests/stats_gtest.cc"]
deps = ["stats", "googletest"]
