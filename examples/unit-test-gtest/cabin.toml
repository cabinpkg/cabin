[package]
name = "unit-test-gtest"
version = "0.1.0"

# Declared under [dependencies]: dev path/port dependencies are
# declaration-only in Cabin today (they never enter the package
# graph), so a `test` target can only link a port that is a normal
# dependency. Only the test target references it, so `cabin build`
# still compiles nothing from the port until `cabin test` needs it.
[dependencies]
googletest = { port = true, version = "^1.17" }

[target.stats]
type = "library"
sources = ["src/stats.cc"]
include-dirs = ["include"]

[target.stats_gtest]
type = "test"
sources = ["tests/stats_gtest.cc"]
deps = ["stats", "googletest"]
