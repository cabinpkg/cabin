[package]
name = "png-info"
version = "0.1.0"
c-standard = "c11"

[dependencies]
# libpng depends on the bundled zlib port. The app declares only
# libpng; zlib is pulled in transitively, and its archive + headers
# propagate through the libpng edge.
libpng = { port = true, version = "^1.6" }

[target.png-info]
type = "executable"
sources = ["src/main.c"]
deps = ["libpng"]
