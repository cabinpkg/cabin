name: Registry

# The publish-pipeline crate paths trigger the conformance job below:
# they shape the archive + canonical-metadata bytes `cabin package`
# emits, which the registry's publish validation must keep accepting.
on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/registry.yml"
      - "registry/**"
      - "crates/cabin-package/**"
      - "crates/cabin-publish/**"
      - "crates/cabin-registry-api/**"
      - "crates/cabin-core/**"
  pull_request:
    paths:
      - ".github/workflows/registry.yml"
      - "registry/**"
      - "crates/cabin-package/**"
      - "crates/cabin-publish/**"
      - "crates/cabin-registry-api/**"
      - "crates/cabin-core/**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: registry

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: registry

      - name: SQL consolidation guard
        run: bash scripts/check-sql.sh

      - name: R2 acquisition guard
        run: bash scripts/check-r2.sh

      - name: Check formatting
        run: cargo fmt --all --verbose -- --check

      - name: Clippy (host)
        run: cargo clippy --all-targets --locked --verbose -- -D warnings

      - name: Clippy (wasm32)
        run: cargo clippy --target wasm32-unknown-unknown --locked --verbose -- -D warnings

      - name: Run host-target tests
        run: cargo test --locked --verbose -- --show-output
        env:
          RUSTFLAGS: -D warnings

      - name: Worker build
        run: |
          cargo install -q "worker-build@=0.8.5" --locked
          worker-build --release

      # After the build so the bundle export check runs against the
      # artifact wrangler would actually deploy.
      - name: Deploy-config guard
        run: bash scripts/check-deploy.sh --require-bundle

  # Feeds archive + metadata pairs freshly produced by the in-tree cabin
  # binary through the server's full publish validation path, so the
  # client's canonical output and the server's schema cannot drift apart.
  conformance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            registry

      - name: Generate fixtures with the in-tree cabin
        run: bash registry/scripts/gen-fixtures.sh "$RUNNER_TEMP/fixtures"

      - name: Validate the generated fixtures against the server rules
        working-directory: registry
        run: cargo test --locked --verbose --test publish_validation -- --include-ignored --show-output
        env:
          CABIN_REGISTRY_FIXTURES: ${{ runner.temp }}/fixtures
          RUSTFLAGS: -D warnings

  # Ships the Worker once the jobs above are green. No build step of
  # its own: `wrangler deploy` runs wrangler.jsonc's build.command.
  # This workflow's paths filter is a sound deploy gate because
  # registry/ is a standalone workspace: every input to the artifact
  # lives under registry/**. D1 migrations stay manual - the deploy
  # token cannot apply them (registry/docs/runbook.md, "Deploy skew").
  deploy-registry:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, conformance]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-registry
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the freshness check below can walk
          # $GITHUB_SHA..origin/main.
          fetch-depth: 0

      - run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: registry

      # The concurrency group serializes deploys but does not order
      # them: an older run whose gate finished late would deploy after
      # a newer one. Skip instead when main already carries a newer
      # commit matching this workflow's trigger paths (that commit's
      # own run deploys, or its gate is red and nothing should).
      - name: Skip when superseded by a newer registry commit
        id: freshness
        run: |
          git fetch --quiet origin main
          if [ -n "$(git rev-list -n 1 "$GITHUB_SHA..origin/main" -- \
              .github/workflows/registry.yml registry/ \
              crates/cabin-package/ crates/cabin-publish/ \
              crates/cabin-registry-api/ crates/cabin-core/)" ]; then
            echo "superseded=true" >> "$GITHUB_OUTPUT"
          fi

      # Changed D1 migrations must be applied by hand before the Worker
      # ships (registry/docs/runbook.md): the deploy token cannot apply
      # them, and activating Worker code built for the new schema first
      # would break the live database. registry/migrations-applied is
      # the operator's stamp of what the live database runs; deploys
      # stay blocked until it matches the migrations' content again.
      # Content, not filenames: the pre-launch wipe policy edits
      # migrations in place.
      - name: Skip until changed D1 migrations are applied by hand
        id: migrations
        run: |
          stamp=$(cat registry/migrations/*.sql | sha256sum | cut -d' ' -f1)
          if [ "$stamp" != "$(cat registry/migrations-applied)" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        if: >-
          steps.freshness.outputs.superseded != 'true' &&
          steps.migrations.outputs.pending != 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_REGISTRY_DEPLOY_TOKEN }}
          # Public account tag (also in wrangler.jsonc vars); pinning it
          # here keeps deploy independent of account inference from the
          # token's resource scope.
          accountId: 7bd7dbea3c4c76cd396153fb0e92178f
          # Keep deployment on the audited CLI version instead of the
          # action's default or a moving major tag.
          wranglerVersion: "4.112.0"
          workingDirectory: registry
