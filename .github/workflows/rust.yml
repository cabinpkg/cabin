name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: uncenter/setup-taplo@v2
        with:
          version: "0.10.0"

      - name: Check Rust formatting
        run: cargo fmt --all --verbose -- --check

      - name: Check TOML formatting
        run: taplo fmt --check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: |
          cargo clippy --workspace --all-targets --all-features --locked \
            --verbose -- -D warnings

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo doc --workspace --all-features --no-deps --locked --verbose
        env:
          RUSTDOCFLAGS: -D warnings

  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          # - macos-26-intel  # FIXME: test fails, investigate
          - macos-26
          - windows-2025-vs2026
          - windows-11-vs2026-arm

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc g++ \
            clang-format clang-tidy pkg-config

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja llvm pkg-config
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        run: choco install --no-progress -y ninja llvm

      - name: Build
        run: cargo check --workspace --all-targets --locked --verbose

      - name: Run Tests
        run: cargo test --workspace --all-targets --all-features --locked --no-fail-fast --verbose -- --show-output
        env:
          RUST_BACKTRACE: "1"

  # Verify Cabin auto-discovers the MSVC toolchain itself, with no
  # Developer Command Prompt / vcvarsall activation. This job deliberately
  # omits `ilammy/msvc-dev-cmd` so `cl.exe` / `lib.exe` and `INCLUDE` /
  # `LIB` are NOT on the environment; a green run proves the
  # `find-msvc-tools` discovery path works end to end. Kept separate from
  # `build-and-test` so the proven, pre-activated path can never be
  # reddened by this one.
  windows-msvc-autodiscovery:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Ninja
        run: choco install --no-progress -y ninja

      - name: Build cabin and run examples without a pre-activated MSVC env
        run: |
          # Guard against a false green: if the runner image ever ships
          # `INCLUDE` / `LIB` pre-set, Cabin's `already_activated()` check
          # short-circuits and the `find-msvc-tools` discovery path is
          # never exercised. Fail loudly so this job keeps proving what it
          # claims to.
          if ($env:INCLUDE -or $env:LIB) {
            Write-Error "INCLUDE/LIB are set; MSVC is pre-activated, so this job would not test auto-discovery."
            exit 1
          }
          cargo build --locked --bin cabin
          $cabin = "$env:GITHUB_WORKSPACE\target\debug\cabin.exe"
          foreach ($example in "hello-cpp", "hello-c") {
            Write-Host "::group::cabin run $example"
            Push-Location "examples\$example"
            & $cabin run
            $code = $LASTEXITCODE
            Pop-Location
            Write-Host "::endgroup::"
            if ($code -ne 0) { exit $code }
          }

  # Reality-check `--version` detection and compiler cfg conditions
  # against real versioned compilers. The canned-banner unit corpus is
  # the primary parser coverage; these legs prove end to end that a
  # pinned gcc-N / clang-N is detected with the right family + major
  # version and that compiler-gated profile flags flip accordingly.
  # macOS (AppleClang) and Windows (MSVC) stay covered by
  # `build-and-test`.
  compiler-detection:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc-12, cxx: g++-12, packages: "gcc-12 g++-12", kind: gcc, major: "12" }
          - { cc: gcc-13, cxx: g++-13, packages: "gcc-13 g++-13", kind: gcc, major: "13" }
          - { cc: gcc-14, cxx: g++-14, packages: "gcc-14 g++-14", kind: gcc, major: "14" }
          - { cc: clang-16, cxx: clang++-16, packages: "clang-16", kind: clang, major: "16" }
          - { cc: clang-17, cxx: clang++-17, packages: "clang-17", kind: clang, major: "17" }
          - { cc: clang-18, cxx: clang++-18, packages: "clang-18", kind: clang, major: "18" }

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.packages }}

      - name: Run compiler detection and condition tests
        run: cargo test -p cabinpkg --test cli --locked --verbose -- --show-output compiler_conditions compiler_detection
        env:
          RUST_BACKTRACE: "1"

      - name: Assert detected identity matches the pinned compiler
        run: |
          cargo build --locked --bin cabin
          mkdir probe && cd probe
          ../target/debug/cabin init --bin
          ../target/debug/cabin metadata > metadata.json
          jq -e '.toolchain.detected.cxx.identity.kind == "${{ matrix.kind }}"' metadata.json
          jq -e '.toolchain.detected.cxx.identity.version | startswith("${{ matrix.major }}.")' metadata.json
