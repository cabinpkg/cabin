name: Registry Verify

# The verification lifecycle's external verifier
# (docs/remote-registry.md, "Verification lifecycle"): list pending
# versions through the admin API, inspect each archive with
# cabin-registry-verify, and PATCH the verdict back.  A failed run
# leaves versions pending - fail-safe by design.  GitHub cron is
# best-effort and can be delayed; the registry's stuck-pending
# webhook alert is the detection mechanism (registry/docs/runbook.md,
# "Verification pipeline").
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

# Runs must never overlap: a run that lists a version while an
# earlier run is mid-verdict could double-report.  A queued run
# supersedes any previously queued one; the running one finishes.
concurrency:
  group: registry-verify

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build the verifier
        run: cargo build --release --locked -p cabinpkg-registry-verify

      - name: Verify pending versions
        env:
          REGISTRY_VERIFY_TOKEN: ${{ secrets.REGISTRY_VERIFY_TOKEN }}
          # The registry to verify.  Repository variables tune the
          # verifier's caps; unset variables arrive as empty strings,
          # which the verifier treats as "use the default".
          REGISTRY_ORIGIN: ${{ vars.REGISTRY_VERIFY_ORIGIN || 'https://registry.cabinpkg.com' }}
          VERIFY_RATIO_CAP: ${{ vars.VERIFY_RATIO_CAP }}
          VERIFY_ABS_CAP_BYTES: ${{ vars.VERIFY_ABS_CAP_BYTES }}
          VERIFY_MAX_ENTRIES: ${{ vars.VERIFY_MAX_ENTRIES }}
          VERIFY_MAX_PATH_LEN: ${{ vars.VERIFY_MAX_PATH_LEN }}
        run: |
          set -euo pipefail
          if [ -z "$REGISTRY_VERIFY_TOKEN" ]; then
            echo "REGISTRY_VERIFY_TOKEN is not configured" >&2
            exit 1
          fi

          # The privileged token travels to exactly two destinations,
          # both of which must be https - curl has no cleartext guard,
          # unlike the Rust clients.
          case "$REGISTRY_ORIGIN" in
            https://*) ;;
            *) echo "REGISTRY_ORIGIN must be https, got: $REGISTRY_ORIGIN" >&2; exit 1 ;;
          esac

          # One hostname, one role: the index origin serves config.json
          # and the artifacts; the admin API lives on the `api` origin
          # config.json declares (docs/remote-registry.md). A missing
          # field fails the run - fail-safe, versions stay pending.
          config=$(curl -fsS -H "authorization: Bearer $REGISTRY_VERIFY_TOKEN" \
            "$REGISTRY_ORIGIN/config.json")
          api_origin=$(jq -er '.api' <<<"$config")
          case "$api_origin" in
            https://*) ;;
            *) echo "config.json api must be https, got: $api_origin" >&2; exit 1 ;;
          esac

          list=$(curl -fsS -H "authorization: Bearer $REGISTRY_VERIFY_TOKEN" \
            "$api_origin/api/v1/admin/versions?status=pending")
          count=$(jq -r '.versions | length' <<<"$list")
          if [ "$count" -eq 0 ]; then
            echo "nothing pending"
            exit 0
          fi
          echo "$count pending version(s)"

          # The corpus for the name advisories, fetched once per run.
          # A failed fetch fails the run under `set -e` - without the
          # corpus no advisory can run, and proceeding without them
          # could verify a confusable name (fail-safe: everything
          # stays pending).
          corpus=$(mktemp)
          curl -fsS -H "authorization: Bearer $REGISTRY_VERIFY_TOKEN" \
            -o "$corpus" "$api_origin/api/v1/admin/packages"

          # One version failing operationally (it stays pending) must
          # not starve the rest of the list; failures are aggregated
          # and fail the run at the end.
          verifier=target/release/cabin-registry-verify
          failures=0
          for i in $(seq 0 $((count - 1))); do
            entry=$(jq -c ".versions[$i]" <<<"$list")
            name=$(jq -r '.name' <<<"$entry")
            version=$(jq -r '.version' <<<"$entry")
            checksum=$(jq -r '.checksum' <<<"$entry")
            published_at=$(jq -r '.published_at' <<<"$entry")

            workdir=$(mktemp -d)
            printf '%s' "$entry" >"$workdir/entry.json"

            # Name advisories run before the download - they need no
            # bytes, so an abstained version costs a listing entry per
            # cron pass, never a re-download. Abstain renders no
            # verdict and is deliberately NOT a failure: the version
            # stays pending until the stuck-pending alert summons the
            # operator (registry/docs/runbook.md, "Verification
            # pipeline").
            if ! advice_json=$("$verifier" --name-advisories "$workdir/entry.json" "$corpus"); then
              echo "$name@$version: name advisories failed operationally; leaving it pending" >&2
              failures=$((failures + 1))
              rm -rf "$workdir"
              continue
            fi
            advice=$(jq -r '.advice' <<<"$advice_json")
            case "$advice" in
              proceed) ;;
              abstain)
                findings=$(jq -r '.findings | join(",")' <<<"$advice_json")
                echo "$name@$version: abstain ($findings); leaving it pending for operator review"
                rm -rf "$workdir"
                continue
                ;;
              *)
                echo "$name@$version: unknown advice '$advice'; leaving it pending" >&2
                failures=$((failures + 1))
                rm -rf "$workdir"
                continue
                ;;
            esac

            # The scoped name `<scope>/<name>` nests the artifact
            # directory (`artifacts/<scope>/<name>/`) while the
            # filename flattens the `/` to `-`
            # (`<scope>-<name>-<version>.zip`), matching the
            # registry's read route.
            stem=${name//\//-}
            if ! curl -fsS -H "authorization: Bearer $REGISTRY_VERIFY_TOKEN" \
              -o "$workdir/archive.zip" \
              "$REGISTRY_ORIGIN/artifacts/$name/$stem-$version.zip"; then
              echo "$name@$version: archive download failed; leaving it pending" >&2
              failures=$((failures + 1))
              rm -rf "$workdir"
              continue
            fi

            if ! result=$("$verifier" "$workdir/archive.zip" "$workdir/entry.json"); then
              echo "$name@$version: verifier failed operationally; leaving it pending" >&2
              failures=$((failures + 1))
              rm -rf "$workdir"
              continue
            fi
            verdict=$(jq -r '.verdict' <<<"$result")
            reason=""
            case "$verdict" in
              verified)
                body=$(jq -cn --arg checksum "$checksum" --arg published_at "$published_at" \
                  '{verdict: "verified", checksum: $checksum, published_at: $published_at}')
                ;;
              rejected)
                reason=$(jq -r '.reasons | join(",")' <<<"$result")
                body=$(jq -cn --arg reason "$reason" --arg checksum "$checksum" --arg published_at "$published_at" \
                  '{verdict: "rejected", reason: $reason, checksum: $checksum, published_at: $published_at}')
                ;;
              *)
                echo "$name@$version: unknown verdict '$verdict'; leaving it pending" >&2
                failures=$((failures + 1))
                rm -rf "$workdir"
                continue
                ;;
            esac

            # A 409 here means the row changed since the listing (a
            # republish or a competing verdict); the next run sees
            # the replacement.
            if ! curl -fsS -X PATCH \
              -H "authorization: Bearer $REGISTRY_VERIFY_TOKEN" \
              -H "content-type: application/json" \
              --data "$body" -o /dev/null \
              "$api_origin/api/v1/admin/versions/$name/$version"; then
              echo "$name@$version: verdict PATCH failed; leaving it pending" >&2
              failures=$((failures + 1))
              rm -rf "$workdir"
              continue
            fi
            echo "$name@$version: $verdict${reason:+ ($reason)}"
            rm -rf "$workdir"
          done

          if [ "$failures" -gt 0 ]; then
            echo "$failures version(s) hit operational failures and stay pending" >&2
            exit 1
          fi
