[package]
name = "nlohmann_json"
version = "3.12.0"

# JSON for Modern C++ is header-only; consumers include
# <nlohmann/json.hpp> from the multi-header include/ root (the
# repository's single_include/ variant is the same content
# amalgamated, so shipping both would be redundant).
[target.nlohmann_json]
type = "header-only"
include-dirs = ["include"]
# Upstream publishes a C++11 interface requirement
# (target_compile_features(... INTERFACE cxx_std_11)); declaring it
# keeps Cabin's c++17 fallback from rejecting valid c++11 / c++14
# consumers.
interface-cxx-standard = "c++11"
